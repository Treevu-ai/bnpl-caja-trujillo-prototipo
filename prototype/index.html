<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuotas Norte BNPL Checkout</title>
    <link rel="stylesheet" href="./styles.css">
    <script type="module" src="./app.js"></script>
</head>
<body>
    <h1>Cuotas Norte BNPL Checkout</h1>
    <p>Total a financiar: S/ 450</p>
    <label for="installments">Seleccione cuotas:</label>
    <select id="installments">
        <option value="3">3 cuotas</option>
        <option value="6">6 cuotas</option>
        <option value="12">12 cuotas</option>
    </select>
    <label for="dni">Ingrese su DNI:</label>
    <input type="text" id="dni" placeholder="DNI" />
    <button id="btn-approve">Simular Aprobación</button>
    <div id="approval-result"></div>
    <script src="./app.js"></script>
</body>
</html>
